<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Cetak EXP 30x15</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:20px;
}

.input-group{
margin-bottom:12px;
}

label{
display:block;
margin-bottom:5px;
font-weight:700;
}

input,
select{
width:100%;
padding:10px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:8px;
}

.preview-btn{
background:#2196F3;
color:#fff;
}

.print-btn{
background:#4CAF50;
color:#fff;
}

.preview-box{
margin-top:20px;
display:flex;
justify-content:center;
}

.preview-label{

width:30mm;
height:15mm;

border:1px dashed #999;

display:flex;
align-items:center;
justify-content:center;

font-size:12pt;
font-weight:bold;

background:#fff;
}

.history{
margin-top:20px;
}

.history h3{
margin-bottom:10px;
}

.history-item{
padding:8px;
background:#f0f0f0;
margin-bottom:5px;
border-radius:6px;
font-size:14px;
}

#printArea{
display:none;
}

@page{
margin:0;
size:62mm auto;
}

@media print{

body *{
visibility:hidden;
}

#printArea,
#printArea *{
visibility:visible;
}

#printArea{
display:block;
position:absolute;
left:0;
top:0;
margin:0;
padding:0;
}

.sheet{

display:grid;

grid-template-columns:
30mm 30mm;

column-gap:2mm;

row-gap:2mm;

padding:0;
margin:0;
}

.label{

width:30mm;
height:15mm;

display:flex;
align-items:center;
justify-content:center;

font-size:12pt;
font-weight:800;

overflow:hidden;

white-space:nowrap;
}

}

</style>
</head>
<body>

<div class="container">

<h2>CETAK EXP</h2>

<div class="input-group">
<label>Tanggal EXP</label>
<input type="date" id="expDate">
</div>

<div class="input-group">
<label>Format</label>
<select id="format">
<option value="1">EXP 31/12/2026</option>
<option value="2">31/12/2026</option>
</select>
</div>

<div class="input-group">
<label>Jumlah Label</label>
<input type="number" id="qty" value="20" min="1">
</div>

<button class="preview-btn" onclick="previewLabel()">
Preview
</button>

<button class="print-btn" onclick="printLabel()">
Print
</button>

<div class="preview-box">
<div id="preview" class="preview-label">
EXP DD/MM/YYYY
</div>
</div>

<div class="history">

<h3>Riwayat Cetak</h3>

<div id="historyList"></div>

</div>

</div>

<div id="printArea"></div>

<script>

let historyData=
JSON.parse(
localStorage.getItem("historyExp") || "[]"
);

renderHistory();

function formatTanggal(value){

if(!value) return "";

let d=new Date(value);

let hari=
String(d.getDate())
.padStart(2,"0");

let bulan=
String(d.getMonth()+1)
.padStart(2,"0");

let tahun=
d.getFullYear();

return hari+"/"+bulan+"/"+tahun;
}

function getText(){

let tanggal=
formatTanggal(
document.getElementById("expDate").value
);

let format=
document.getElementById("format").value;

if(format==="1"){
return "EXP "+tanggal;
}

return tanggal;
}

function previewLabel(){

let text=getText();

document.getElementById("preview")
.innerHTML=text;

}

function printLabel(){

let text=getText();

let qty=parseInt(
document.getElementById("qty").value
);

if(text==="EXP " || text===""){
alert("Pilih tanggal terlebih dahulu");
return;
}

let html='<div class="sheet">';

for(let i=0;i<qty;i++){

html+=`
<div class="label">
${text}
</div>
`;

}

html+='</div>';

document.getElementById("printArea")
.innerHTML=html;

saveHistory(text,qty);

window.print();

}

function saveHistory(text,qty){

historyData.unshift({
text:text,
qty:qty,
time:new Date()
.toLocaleString("id-ID")
});

if(historyData.length>20){
historyData.length=20;
}

localStorage.setItem(
"historyExp",
JSON.stringify(historyData)
);

renderHistory();

}

function renderHistory(){

let box=
document.getElementById("historyList");

box.innerHTML="";

historyData.forEach(item=>{

box.innerHTML+=`
<div class="history-item">
${item.text}
<br>
Qty : ${item.qty}
<br>
${item.time}
</div>
`;

});

}

previewLabel();

</script>

</body>
</html>
