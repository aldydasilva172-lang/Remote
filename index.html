<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HY320 Bluetooth Test</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding:20px;
}
button{
    width:120px;
    height:50px;
    margin:8px;
    border:none;
    border-radius:12px;
    font-size:16px;
}
.connect{
    background:#00c853;
    color:white;
}
.control{
    background:#2196f3;
    color:white;
}
</style>
</head>
<body>

<h2>HY320 Bluetooth Test</h2>

<button class="connect" onclick="connectBT()">
Connect Bluetooth
</button>

<br><br>

<button class="control">▲</button>
<br>
<button class="control">◀</button>
<button class="control">OK</button>
<button class="control">▶</button>
<br>
<button class="control">▼</button>

<p id="status">Belum terhubung</p>

<script>
let device;

async function connectBT(){
    try{
        device = await navigator.bluetooth.requestDevice({
            acceptAllDevices:true,
            optionalServices:[]
        });

        document.getElementById("status").innerHTML =
        "Terhubung ke: " + device.name;

        console.log(device);

    }catch(err){
        document.getElementById("status").innerHTML =
        "Gagal: " + err.message;
    }
}
</script>

</body>
</html>
