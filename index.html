<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LABEL PRINTER 30x15mm</title>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:550px;
margin:auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,.15);
}

h2{
text-align:center;
margin-bottom:15px;
}

.tabs{
display:flex;
gap:8px;
margin-bottom:15px;
}

.tab{
flex:1;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
background:#e5e5e5;
}

.tab.active{
background:#007bff;
color:#fff;
}

.panel{
display:none;
}

.panel.active{
display:block;
}

.input-group{
margin-bottom:12px;
}

label{
display:block;
font-size:13px;
font-weight:bold;
margin-bottom:5px;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:8px;
}

.btn{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
background:#007bff;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.preview{
display:flex;
justify-content:center;
margin-top:20px;
}

.label-preview{
width:30mm;
height:15mm;
border:1px solid #000;
background:#fff;
padding:1mm;
overflow:hidden;
}

.preview-name{
font-size:5px;
font-weight:bold;
text-align:center;
white-space:nowrap;
overflow:hidden;
}

.exp-preview{
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:8px;
font-weight:700;
}

.two-date{
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:7px;
font-weight:700;
}

.two-date span:first-child{
margin-bottom:2px;
}

.print-sheet{
width:70mm;
display:grid;
grid-template-columns:30mm 30mm;
column-gap:2mm;
row-gap:2mm;
padding:2mm;
}

.label{
width:30mm;
height:15mm;
border:1px solid #000;
padding:1mm;
overflow:hidden;
}

.label-name{
font-size:5px;
font-weight:bold;
text-align:center;
white-space:nowrap;
overflow:hidden;
}

.exp-text{
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:8px;
font-weight:700;
}

.two-date-print{
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:7px;
font-weight:700;
}

.two-date-print span:first-child{
margin-bottom:2px;
}

@media print{

body *{
visibility:hidden;
}

#printArea,
#printArea *{
visibility:visible;
}

#printArea{
position:absolute;
left:0;
top:0;
width:70mm;
}

@page{
size:70mm auto;
margin:0;
}

}

</style>
</head>
<body>

<div class="container">

<h2>LABEL PRINTER 30x15mm</h2>

<div class="tabs">

<button class="tab active"
onclick="showTab('barcode',this)">
Barcode
</button>

<button class="tab"
onclick="showTab('exp',this)">
Exp Date
</button>

<button class="tab"
onclick="showTab('date2',this)">
2 Tanggal
</button>

</div>

<!-- BARCODE -->

<div id="barcode" class="panel active">

<div class="input-group">
<label>Nama Produk</label>
<input id="nama" value="BEEF BULGOGI">
</div>

<div class="input-group">
<label>Barcode</label>
<input id="barcodeValue" value="2100000117383">
</div>

<div class="input-group">
<label>Jumlah Cetak</label>
<input id="barcodeQty" type="number" value="10">
</div>

<button class="btn" onclick="previewBarcode()">
Preview Barcode
</button>

<button class="btn" onclick="printBarcode()">
Print Barcode
</button>

<div class="preview" id="barcodePreview"></div>

</div>

<!-- EXP -->

<div id="exp" class="panel">

<div class="input-group">

<label>Tanggal Expired</label>

<input id="expDate" type="date">

</div>

<div class="input-group">

<label>Jumlah Cetak</label>

<input id="expQty" type="number" value="10">

</div>

<button class="btn" onclick="previewExp()">

Preview Exp

</button>

<button class="btn" onclick="printExp()">

Print Exp

</button>

<div class="preview" id="expPreview"></div>

</div>

<!-- 2 TANGGAL -->

<div id="date2" class="panel">

<div class="input-group">
<label>Tanggal Atas</label>
<input id="tgl1" type="date">
</div>

<div class="input-group">
<label>Tanggal Bawah</label>
<input id="tgl2" type="date">
</div>

<div class="input-group">
<label>Jumlah Cetak</label>
<input id="dateQty" type="number" value="10">
</div>

<button class="btn" onclick="previewDate2()">
Preview 2 Tanggal
</button>

<button class="btn" onclick="printDate2()">
Print 2 Tanggal
</button>

<div class="preview" id="datePreview"></div>

</div>

</div>

<div id="printArea" style="display:none"></div>

<script>

function showTab(id,btn){

document.querySelectorAll('.panel')
.forEach(x=>x.classList.remove('active'));

document.querySelectorAll('.tab')
.forEach(x=>x.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

btn.classList.add('active');

}

function formatDate(date){

if(!date)return "";

const d=new Date(date);

const dd=String(d.getDate()).padStart(2,'0');
const mm=String(d.getMonth()+1).padStart(2,'0');
const yy=d.getFullYear();

return `${dd}/${mm}/${yy}`;

}

/* BARCODE */

function previewBarcode(){

const nama=document.getElementById('nama').value;
const code=document.getElementById('barcodeValue').value;

document.getElementById('barcodePreview').innerHTML=`

<div class="label-preview">
<div class="preview-name">${nama}</div>
<svg id="previewSvg"></svg>
</div>

`;

JsBarcode("#previewSvg",code,{
format:"CODE128",
displayValue:true,
fontSize:6,
height:18,
margin:0
});

}

function printBarcode(){

const nama=document.getElementById('nama').value;
const code=document.getElementById('barcodeValue').value;
const qty=parseInt(document.getElementById('barcodeQty').value);

let html='<div class="print-sheet">';

for(let i=0;i<qty;i++){

html+=`

<div class="label">
<div class="label-name">${nama}</div>
<svg id="bc${i}"></svg>
</div>

`;

}

html+='</div>';

printArea.innerHTML=html;
printArea.style.display='block';

for(let i=0;i<qty;i++){

JsBarcode(`#bc${i}`,code,{
format:"CODE128",
displayValue:true,
fontSize:6,
height:18,
margin:0
});

}

setTimeout(()=>window.print(),300);

}

/* EXP */

function previewExp(){

const exp=formatDate(
document.getElementById('expDate').value
);

document.getElementById('expPreview').innerHTML=`

<div class="label-preview">
<div class="exp-preview">${exp}</div>
</div>

`;

}

function printExp(){

const exp=formatDate(
document.getElementById('expDate').value
);

const qty=parseInt(
document.getElementById('expQty').value
);

let html='<div class="print-sheet">';

for(let i=0;i<qty;i++){

html+=`

<div class="label">
<div class="exp-text">${exp}</div>
</div>

`;

}

html+='</div>';

printArea.innerHTML=html;
printArea.style.display='block';

setTimeout(()=>window.print(),300);

}

/* 2 TANGGAL */

function previewDate2(){

const atas=formatDate(
document.getElementById('tgl1').value
);

const bawah=formatDate(
document.getElementById('tgl2').value
);

document.getElementById('datePreview').innerHTML=`

<div class="label-preview">

<div class="two-date">
<span>${atas}</span>
<span>${bawah}</span>
</div>

</div>

`;

}

function printDate2(){

const atas=formatDate(
document.getElementById('tgl1').value
);

const bawah=formatDate(
document.getElementById('tgl2').value
);

const qty=parseInt(
document.getElementById('dateQty').value
);

let html='<div class="print-sheet">';

for(let i=0;i<qty;i++){

html+=`

<div class="label">

<div class="two-date-print">
<span>${atas}</span>
<span>${bawah}</span>
</div>

</div>

`;

}

html+='</div>';

printArea.innerHTML=html;
printArea.style.display='block';

setTimeout(()=>window.print(),300);

}

previewBarcode();

</script>

</body>
</html>
